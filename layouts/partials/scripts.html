		<script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
		<script>
			var Grid = (function() {

				var $grid = $( '*#og-grid' ),
					$items = $grid.children( 'li' ),
					current = -1,
					previewPos = -1,
					scrollExtra = 0,
					marginExpanded = 10,
					$window = $( window ), winsize,
					$body = $( 'html, body' ),
					transEndEventName = 'transitionend',
					support = true,
					settings = {
						minHeight : 500,
						speed : 350,
						easing : 'ease'
					};

				function waitImagesLoaded( $container, callback ) {
					var imgs = $container.find( 'img' ).toArray();
					if ( !imgs.length ) { callback(); return; }
					var remaining = imgs.length;
					function decrement() {
						if ( --remaining === 0 ) callback();
					}
					imgs.forEach( function( img ) {
						if ( img.complete ) {
							decrement();
						} else {
							$( img ).one( 'load error', decrement );
						}
					} );
				}

				function init( config ) {

					settings = $.extend( true, {}, settings, config );

					waitImagesLoaded( $grid, function() {
						saveItemInfo( true );
						getWinSize();
						initEvents();
					} );

				}

				function addItems( $newitems ) {

					$items = $items.add( $newitems );

					$newitems.each( function() {
						var $item = $( this );
						$item.data( {
							offsetTop : $item.offset().top,
							height : $item.height()
						} );
					} );

					initItemsEvents( $newitems );

				}

				function saveItemInfo( saveheight ) {
					$items.each( function() {
						var $item = $( this );
						$item.data( 'offsetTop', $item.offset().top );
						if( saveheight ) {
							$item.data( 'height', $item.height() );
						}
					} );
				}

				function initEvents() {

					initItemsEvents( $items );

					var resizeTimeout;
					$window.on( 'resize', function() {
						clearTimeout( resizeTimeout );
						resizeTimeout = setTimeout( function() {
							scrollExtra = 0;
							previewPos = -1;
							saveItemInfo();
							getWinSize();
							var preview = $.data( window, 'preview' );
							if( typeof preview != 'undefined' ) {
								hidePreview();
							}
						}, 250 );
					} );

				}

				function initItemsEvents( $items ) {
					$items.on( 'click', 'span.og-close', function() {
						hidePreview();
						return false;
					} ).on( 'click', 'span.og-share', function() {
						var $item = $( this ).closest( 'li' );
						var articleId = $item.data( 'article-id' );
						var url = window.location.origin + window.location.pathname + '#' + articleId;

						navigator.clipboard.writeText(url).then(function() {
							var $shareBtn = $( this );
							$shareBtn.addClass('og-share-copied');
							setTimeout(function() {
								$shareBtn.removeClass('og-share-copied');
							}, 2000);
						}.bind(this), function(err) {
							console.error('Erreur lors de la copie:', err);
						});

						return false;
					} ).children( 'a' ).on( 'click', function(e) {

						var $item = $( this ).parent();
						current === Array.from($items).findIndex(d => d == $item[0]) ? hidePreview() : showPreview( $item );
						return false;

					} );
				}

				function getWinSize() {
					winsize = { width : $window.width(), height : $window.height() };
				}

				function showPreview( $item ) {

					var preview = $.data( window, 'preview' ),
						position = $item.data( 'offsetTop' );

					scrollExtra = 0;

					if( typeof preview != 'undefined' ) {

						if( previewPos !== position ) {
							if( position > previewPos ) {
								scrollExtra = preview.height;
							}
							hidePreview();
						}
						else {
							preview.update( $item );
							return false;
						}

					}

					previewPos = position;
					preview = $.data( window, 'preview', new Preview( $item ) );
					preview.open();

				}

				function hidePreview() {
					current = -1;
					var preview = $.data( window, 'preview' );
					preview.close();
					$.removeData( window, 'preview' );
				}

				function Preview( $item ) {
					this.$item = $item;
					this.expandedIdx = Array.from($items).findIndex(d => d == this.$item[0]);
					this.create();
					this.update();
				}


				Preview.prototype = {
					create : function() {
						this.$title = $( '<h3 style="text-align: center;"></h3>' );
						this.$loading = $( '<div class="og-loading"></div>' );
						this.$fullimage = $( '<div class="og-fullimg" style="width: 100%; text-align: center;"></div>' ).append( this.$loading );
						this.$closePreview = $( '<span class="og-close"></span>' );
						this.$shareButton = $( '<span class="og-share" title="Copier le lien"></span>' );
						this.$previewInner = $( '<div class="og-expander-inner"></div>' ).append( this.$closePreview, this.$shareButton, this.$title, this.$fullimage );
						this.$previewEl = $( '<div class="og-expander"></div>' ).append( this.$previewInner );
						this.$item.append( this.getEl() );
						if( support ) {
							this.setTransition();
						}
					},
					update : function( $item ) {
						var self = this;

						if( $item ) {
							this.$item = $item;
						}

						if( current !== -1 ) {
							var $currentItem = $items.eq( current );
							$currentItem.removeClass( 'og-expanded' );
							this.$item.addClass( 'og-expanded' );
							this.positionPreview();
						}

						current = this.$item.index();

						var $itemEl = this.$item.children( 'a' );
						this.eldata = {
							href : $itemEl.attr( 'href' ),
							title : $itemEl.data( 'title' ),
							description : $itemEl.data( 'description' ),
							buttontext : $itemEl.data( 'buttontext' ),
							content : $itemEl.data( 'content' )
						};

						this.$title.html( this.eldata.title );

						if( typeof this.$largeImg != 'undefined' ) {
							this.$largeImg.remove();
						}

						// Show loading spinner and immediately load new media content
						this.$loading.show();
						this.$fullimage.empty();

						// Load media content immediately when updating
						setTimeout(function() {
							self.loadMedia();
						}, 50);

					},
					loadMedia : function() {
						var self = this;

						// Load media content after animation completes
						if( this.eldata.content && this.$fullimage.is( ':visible' ) ) {
							this.$loading.hide();
							this.$fullimage.find( 'img' ).remove();
							// Function to decode HTML entities
							function htmlDecode(input) {
								var tempDiv = document.createElement('div');
								tempDiv.innerHTML = input;
								return tempDiv.textContent || tempDiv.innerText || '';
							}
							// Decode and insert HTML content
							var decodedContent = htmlDecode(this.eldata.content);
							this.$fullimage.html( decodedContent );
						}
						// Otherwise, hide loading and show nothing
						else if( this.$fullimage.is( ':visible' ) ) {
							this.$loading.hide();
						}
					},
					open : function() {
						var self = this;

						setTimeout( function() {
							self.setHeights();
							self.positionPreview();

							// Load media content after animation completes
							setTimeout( function() {
								self.loadMedia();
							}, settings.speed + 100 );

						}, 25 );

					},
					close : function() {

						var self = this,
							onEndFn = function() {
								if( support ) {
									$( this ).off( transEndEventName );
								}
								self.$item.removeClass( 'og-expanded' );
								self.$previewEl.remove();
							};

						setTimeout( function() {

							if( typeof self.$largeImg !== 'undefined' ) {
								self.$largeImg.fadeOut( 'fast' );
							}
							self.$previewEl.css( 'height', 0 );
							var $expandedItem = $items.eq( self.expandedIdx );
							$expandedItem.css( 'height', $expandedItem.data( 'height' ) ).on( transEndEventName, onEndFn );

							if( !support ) {
								onEndFn.call();
							}

						}, 25 );

						return false;

					},
					calcHeight : function() {

						var heightPreview = Math.min(Math.max(winsize.height - this.$item.data( 'height' ) - marginExpanded, 400), 450),
							itemHeight = winsize.height;

						if( heightPreview < settings.minHeight ) {
							heightPreview = Math.min(settings.minHeight, 450);
							itemHeight = heightPreview + this.$item.data( 'height' ) + marginExpanded;
						}

						this.height = heightPreview;
						this.itemHeight = itemHeight;

					},
					setHeights : function() {

						var self = this,
							onEndFn = function() {
								if( support ) {
									self.$item.off( transEndEventName );
								}
								self.$item.addClass( 'og-expanded' );
							};

						this.calcHeight();
						this.$previewEl.css( 'height', this.height );
						this.$item.css( 'height', this.itemHeight ).on( transEndEventName, onEndFn );

						if( !support ) {
							onEndFn.call();
						}

					},
					positionPreview : function() {

						var position = this.$item.data( 'offsetTop' ),
							previewOffsetT = this.$previewEl.offset().top - scrollExtra,
							scrollVal = this.height + this.$item.data( 'height' ) + marginExpanded <= winsize.height ? position : this.height < winsize.height ? previewOffsetT - ( winsize.height - this.height ) : previewOffsetT;

						$body.animate( { scrollTop : scrollVal }, settings.speed );

					},
					setTransition  : function() {
						this.$previewEl.css( 'transition', 'height ' + settings.speed + 'ms ' + settings.easing );
						this.$item.css( 'transition', 'height ' + settings.speed + 'ms ' + settings.easing );
					},
					getEl : function() {
						return this.$previewEl;
					}
				}

				return {
					init : init,
					addItems : addItems
				};

			})();
		</script>
		<script>
			$(function() {
				Grid.init();

				// Ouvrir automatiquement l'article depuis l'URL hash
				if (window.location.hash) {
					var articleId = window.location.hash.substring(1);
					var $targetItem = $('li[data-article-id="' + articleId + '"]');

					if ($targetItem.length) {
						setTimeout(function() {
							$targetItem.find('a').click();
						}, 500);
					}
				}
			});
		</script>
